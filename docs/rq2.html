const STAGE_ORDER = [
  "Chip Design","Deposition","Photolithography","Etch & Clean","Ion Implantation",
  "Mechanical Planarization","Assembly and Packaging","Testing","Finished Logic Chip"
];

const ROW1 = STAGE_ORDER.slice(0,5);
const ROW2 = STAGE_ORDER.slice(5);

function buildPipeline(){
  const el = document.getElementById("pipeline");
  el.innerHTML = "";

  function makeRow(stages, addTrailingArrow){
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;gap:8px;flex-wrap:nowrap";
    stages.forEach((s,i)=>{
      const btn = document.createElement("button");
      btn.className = "stage-btn";
      btn.textContent = s;
      btn.dataset.stage = s;
      btn.onclick = () => showStage(s);
      row.appendChild(btn);
      if(i < stages.length - 1){
        const arr = document.createElement("span");
        arr.className = "arrow";
        arr.textContent = "→";
        row.appendChild(arr);
      }
    });
    if(addTrailingArrow){
      const arr = document.createElement("span");
      arr.className = "arrow";
      arr.textContent = "→";
      row.appendChild(arr);
    }
    return row;
  }

  el.appendChild(makeRow(ROW1, true));
  const spacer = document.createElement("div");
  spacer.style.cssText = "width:100%;height:0";
  el.appendChild(spacer);
  el.appendChild(makeRow(ROW2, false));
}

function setActive(stage){
  document.querySelectorAll(".stage-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.stage === stage);
  });
}

function showStage(stage){
  setActive(stage);
  const content = document.getElementById("content");
  const stageData = DATA[stage];

  if(stageData.mode === "none"){
    content.innerHTML = `<div class="finished-box">This is the final output stage of the manufacturing pipeline.</div>`;
    return;
  }

  const shareType = stageData.mode === "country" ? "country" : "company";
  const years = stageData.inputs.map(i => parseInt(i.year)).filter(Boolean);
  const maxYear = years.length ? Math.max(...years) : null;
  const yearLabel = maxYear ? ` (Market share by ${shareType} in ${maxYear})` : ` (Market share by ${shareType})`;

  let html = `<div class="stage-header">${stage} Inputs with Suppliers${yearLabel}</div>`;

  stageData.inputs.forEach((inp, idx) => {
    const modeLabel = inp.mode === "country" ? "Country" : "Company";
    html += `<div class="input-block">`;
    html += `<div class="input-header">${idx+1}. ${inp.name}</div>`;
    html += `<div class="input-body">`;

    if(inp.monopoly){
      html += `<p class="monopoly-text">${inp.monopoly} accounted for 100% of the market share for ${inp.name.toLowerCase()}${inp.year ? " in "+inp.year : ""}.</p>`;
    } else {
      inp.data.forEach(d => {
        const w = (d.share / 100 * 100).toFixed(1);
        const labelEsc = d.label.replace(/'/g, "\'").replace(/"/g, "&quot;");
        html += `<div class="bar-row"
          onmouseenter="showTip(event,'${labelEsc}','${Math.round(d.share)}%','${modeLabel}')"
          onmouseleave="hideTip()">
          <div class="bar-label">${d.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
          <div class="bar-pct">${Math.round(d.share)}%</div>
        </div>`;
      });
    }

    html += `</div></div>`;
  });

  content.innerHTML = html;
}

function showTip(e, label, share, type) {
  const t = document.getElementById('rq2-tooltip');
  t.innerHTML = `<div class="tip-row">${type}: ${label}</div><div class="tip-row">Market share: ${share}</div>`;
  t.style.display = 'block';
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
}

function hideTip() {
  document.getElementById('rq2-tooltip').style.display = 'none';
}

document.addEventListener('mousemove', function(e) {
  const t = document.getElementById('rq2-tooltip');
  if(t.style.display === 'block'){
    t.style.left = (e.clientX + 14) + 'px';
    t.style.top = (e.clientY - 10) + 'px';
  }
});

buildPipeline();
showStage("Chip Design");
</script>
